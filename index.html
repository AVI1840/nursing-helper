      // SPA redirect handler for GitHub Pages
      // Restores the original URL from 404.html redirect
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q');
          // Must include the basename /nursing-helper for React Router
          var base = '/nursing-helper';
