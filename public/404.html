<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>סיעוד 360</title>
    <script>
      // SPA redirect for GitHub Pages
      // Converts /nursing-helper/wizard?x=1 → /nursing-helper/?p=/wizard&q=x=1
      var pathSegmentsToKeep = 1; // keep /nursing-helper/
      var l = window.location;
      var repo = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      var route = l.pathname.slice(repo.length);
      l.replace(
        repo + '/?p=' + encodeURIComponent(route) +
        (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
